name: CI Pipeline - SQA Social Media

on:
  pull_request:
    branches: [main]

jobs:
  test-api-unit:
    name: Testes Unitários - API (JUnit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Executar testes JUnit
        run: cd api && ./mvnw test
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: api/target/surefire-reports/

  test-client-unit:
    name: Testes Unitários - Client (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências
        run: cd client && npm ci

      - name: Executar testes Jest
        run: cd client && npm test -- --ci --passWithNoTests
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: client/coverage/

  test-e2e:
    name: Testes E2E e de API (Playwright)
    runs-on: ubuntu-latest
    needs: [test-api-unit, test-client-unit]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: sqasocial
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build da API
        run: cd api && ./mvnw package -DskipTests

      - name: Iniciar API
        run: |
          java -jar api/target/demo-0.0.1-SNAPSHOT.jar \
            --spring.datasource.url="jdbc:mysql://127.0.0.1:3306/sqasocial?allowPublicKeyRetrieval=true&useSSL=false" \
            --spring.datasource.username=root \
            --spring.datasource.password=testpassword \
            --spring.jpa.hibernate.ddl-auto=create-drop &
          timeout 90 bash -c 'until curl -sf http://localhost:8080/posts > /dev/null 2>&1; do sleep 3; done'

      - name: Instalar dependências do client
        run: cd client && npm ci

      - name: Build do client
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:8080
        run: cd client && npm run build

      - name: Iniciar client
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:8080
        run: |
          cd client && npm start &
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 3; done'

      - name: Instalar dependências do Playwright
        run: cd tests && npm ci

      - name: Instalar browser Chromium
        run: cd tests && npx playwright install chromium --with-deps

      - name: Executar testes Playwright
        run: cd tests && npm test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
